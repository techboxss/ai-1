services:
  # ── Backend: FastAPI Python Service ──────────────────────────────────────────
  - type: web
    name: legalease-backend
    runtime: python
    pythonVersion: "3.12"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.index:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SESSION_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false          # e.g. https://legalease-backend.onrender.com/api/auth/google/callback
      - key: FRONTEND_ORIGIN
        sync: false          # e.g. https://legalease-frontend.onrender.com
      - key: BACKEND_BASE_URL
        sync: false          # e.g. https://legalease-backend.onrender.com
      - key: OLLAMA_BASE_URL
        value: http://localhost:11434
      - key: OLLAMA_MODEL
        value: llama3.2:latest

  # ── Frontend: React/Vite Static Site ─────────────────────────────────────────
  - type: static
    name: legalease-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false          # e.g. https://legalease-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
